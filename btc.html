<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<style>
		h1{
			animation:2s move forwards;
			animation-delay:1s;
			position:absolute;
			transform:scale(10);
			top:-200px;
			left:50%;
			color:black;
			font-family:"PingFang SC"
		}
		@keyframes move{
			0%{top:-200px;left:50%;}
			100%{top:50%;left:50%;}
		}
	</style>
</head>
<body>
	<a href="2.html"><h1>你好!</h1></a>
</body>
</html>
