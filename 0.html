<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇（慢速+中间食物）</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif;}
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #1a1a1a;
            padding: 20px 0;
        }
        #gameBox {border: 3px solid #444; background: #000;}
        .info {color: #fff; font-size: 22px; margin-bottom: 10px;}
        .restart {
            margin: 12px 0 20px;
            padding: 8px 24px;
            font-size: 18px;
            cursor: pointer;
            background: #00cc66;
            border: none;
            border-radius: 6px;
            color: #000;
        }
        .control {
            display: grid;
            grid-template-columns: 60px 60px 60px;
            gap: 8px;
            margin: 0 auto;
        }
        .ctrl-btn {
            width: 60px;
            height: 60px;
            font-size: 26px;
            border: none;
            border-radius: 8px;
            background: #444;
            color: white;
            cursor: pointer;
        }
        .ctrl-btn:active {
            background: #00cc66;
            color: #000;
        }
        .empty {visibility: hidden;}
    </style>
</head>
<body>
    <div class="info">得分：<span id="score">0</span></div>
    <canvas id="gameBox" width="400" height="400"></canvas>
    <button class="restart" onclick="restartGame()">重新开始</button>

    <div class="control">
        <div class="empty"></div>
        <button class="ctrl-btn" onclick="goUp()">↑</button>
        <div class="empty"></div>

        <button class="ctrl-btn" onclick="goLeft()">←</button>
        <div class="empty"></div>
        <button class="ctrl-btn" onclick="goRight()">→</button>

        <div class="empty"></div>
        <button class="ctrl-btn" onclick="goDown()">↓</button>
        <div class="empty"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameBox');
        const ctx = canvas.getContext('2d');
        const scoreText = document.getElementById('score');

        const size = 20;
        const totalGrid = canvas.width / size;
        let snake = [{x: 10, y: 10}];
        let food = {};
        let dx = 1, dy = 0;
        let score = 0;
        let timer;

        // 食物只在中间区域生成，不靠墙壁
        function createFood() {
            const min = 2;
            const max = totalGrid - 3;
            return {
                x: Math.floor(Math.random() * (max - min + 1)) + min,
                y: Math.floor(Math.random() * (max - min + 1)) + min
            }
        }
        food = createFood();

        function drawBlock(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * size, y * size, size - 1, size - 1);
        }

        function gameLoop() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            if (head.x < 0 || head.y < 0 || head.x >= totalGrid || head.y >= totalGrid) {
                clearInterval(timer);
                alert('游戏结束！得分：' + score);
                return;
            }
            for (let seg of snake) {
                if (seg.x === head.x && seg.y === head.y) {
                    clearInterval(timer);
                    alert('游戏结束！得分：' + score);
                    return;
            }
            }

            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreText.innerText = score;
                food = createFood();
            } else {
                snake.pop();
            }

            snake.forEach((seg, idx) => {
                drawBlock(seg.x, seg.y, idx === 0 ? '#0f0' : '#0cc');
            })
            drawBlock(food.x, food.y, '#f33');
        }

        function goUp() {
            if (dy !== 1) {dx = 0; dy = -1;}
        }
        function goDown() {
            if (dy !== -1) {dx = 0; dy = 1;}
        }
        function goLeft() {
            if (dx !== 1) {dx = -1; dy = 0;}
        }
        function goRight() {
            if (dx !== -1) {dx = 1; dy = 0;}
        }

        document.addEventListener('keydown', e => {
            switch(e.key) {
                case 'ArrowUp': goUp(); break;
                case 'ArrowDown': goDown(); break;
                case 'ArrowLeft': goLeft(); break;
                case 'ArrowRight': goRight(); break;
            }
        })

        function restartGame() {
            clearInterval(timer);
            snake = [{x: 10, y: 10}];
            dx = 1; dy = 0;
            score = 0;
            scoreText.innerText = 0;
            food = createFood();
            timer = setInterval(gameLoop, 300);
        }

        // 300毫秒，移动速度很慢
        timer = setInterval(gameLoop, 300);
    </script>
</body>
</html>
