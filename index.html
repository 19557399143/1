<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>翻牌记忆游戏 - Memory Match</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game">
    <header>
      <h1>翻牌记忆</h1>
      <div class="controls">
        <button id="restart">重新开始</button>
        <div class="status">
          <span id="moves">步数: 0</span>
          <span id="timer">时间: 0s</span>
        </div>
      </div>
    </header>

    <main>
      <div id="board" class="board" aria-live="polite"></div>
    </main>

    <footer>
      最佳用时: <span id="best">—</span>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
